name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -v

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      # Required for PyPI Trusted Publishing (OIDC). No PYPI_TOKEN secret needed.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build tooling
        run: pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject version ($PKG_VERSION)"
            exit 1
          fi
      - name: Publish to PyPI
        # Authenticates via OIDC Trusted Publishing — configure this repo as a
        # trusted publisher at https://pypi.org/manage/project/sonilo-mcp/settings/publishing/
        # (workflow: release.yml). No password/token required.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
